version: "3.8"

# ─────────────────────────────────────────────────────────────
#  Distributed SolrCloud + ZooKeeper Ensemble
#
#  Topology
#  ┌─────────────────────────────────────────────────────────┐
#  │  ZooKeeper Ensemble (3 nodes, quorum = 2)               │
#  │    zoo1:2181   zoo2:2181   zoo3:2181                    │
#  └────────────────────────┬────────────────────────────────┘
#                           │ config & coordination
#  ┌────────────────────────▼────────────────────────────────┐
#  │  SolrCloud Cluster (3 nodes)                            │
#  │    solr1:8983  solr2:8984  solr3:8985                  │
#  │                                                         │
#  │  Collection "products" (2 shards × replication=2)       │
#  │    shard1 leader → solr1   replica → solr2              │
#  │    shard2 leader → solr2   replica → solr3              │
#  └─────────────────────────────────────────────────────────┘
# ─────────────────────────────────────────────────────────────

networks:
  solr_net:
    driver: bridge

volumes:
  zoo1_data:
  zoo2_data:
  zoo3_data:
  solr1_data:
  solr2_data:
  solr3_data:

x-zookeeper-base: &zookeeper-base
  image: zookeeper:3.9
  restart: unless-stopped
  networks:
    - solr_net
  environment:
    ZOO_MY_ID: "1"              # overridden per node
    ZOO_SERVERS: "server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181"
    ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok,stat"
    ZOO_LOG_LEVEL: "WARN"
  healthcheck:
    test: ["CMD", "zkServer.sh", "status"]
    interval: 10s
    timeout: 5s
    retries: 10

x-solr-base: &solr-base
  image: solr:9.7
  restart: unless-stopped
  networks:
    - solr_net
  environment:
    ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
    SOLR_HEAP: "512m"
    SOLR_JAVA_MEM: "-Xms256m -Xmx512m"
    SOLR_LOG_LEVEL: "WARN"
    # Expose Solr metrics via Prometheus endpoint
    SOLR_OPTS: "-Dsolr.liveNodes.maxSize=100"
  depends_on:
    zoo1:
      condition: service_healthy
    zoo2:
      condition: service_healthy
    zoo3:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "curl -sf 'http://localhost:8983/solr/admin/info/system?wt=json' | grep -q '\"status\":0' || exit 1"]
    interval: 15s
    timeout: 10s
    retries: 20
    start_period: 30s

services:

  # ── ZooKeeper Ensemble ─────────────────────────────────────

  zoo1:
    <<: *zookeeper-base
    container_name: zoo1
    hostname: zoo1
    environment:
      ZOO_MY_ID: "1"
      ZOO_SERVERS: "server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181"
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok,stat"
      ZOO_LOG_LEVEL: "WARN"
    volumes:
      - zoo1_data:/data
    ports:
      - "2181:2181"

  zoo2:
    <<: *zookeeper-base
    container_name: zoo2
    hostname: zoo2
    environment:
      ZOO_MY_ID: "2"
      ZOO_SERVERS: "server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181"
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok,stat"
      ZOO_LOG_LEVEL: "WARN"
    volumes:
      - zoo2_data:/data
    ports:
      - "2182:2181"

  zoo3:
    <<: *zookeeper-base
    container_name: zoo3
    hostname: zoo3
    environment:
      ZOO_MY_ID: "3"
      ZOO_SERVERS: "server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181"
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok,stat"
      ZOO_LOG_LEVEL: "WARN"
    volumes:
      - zoo3_data:/data
    ports:
      - "2183:2181"

  # ── Solr Cluster ───────────────────────────────────────────

  solr1:
    <<: *solr-base
    container_name: solr1
    hostname: solr1
    environment:
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
      SOLR_HEAP: "512m"
      SOLR_JAVA_MEM: "-Xms256m -Xmx512m"
      SOLR_LOG_LEVEL: "WARN"
      SOLR_OPTS: "-Dsolr.liveNodes.maxSize=100 -Dhost=solr1"
    volumes:
      - solr1_data:/var/solr
      - ./solr/configsets:/configsets:ro
    ports:
      - "8983:8983"

  solr2:
    <<: *solr-base
    container_name: solr2
    hostname: solr2
    environment:
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
      SOLR_HEAP: "512m"
      SOLR_JAVA_MEM: "-Xms256m -Xmx512m"
      SOLR_LOG_LEVEL: "WARN"
      SOLR_OPTS: "-Dsolr.liveNodes.maxSize=100 -Dhost=solr2"
    volumes:
      - solr2_data:/var/solr
      - ./solr/configsets:/configsets:ro
    ports:
      - "8984:8983"

  solr3:
    <<: *solr-base
    container_name: solr3
    hostname: solr3
    environment:
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
      SOLR_HEAP: "512m"
      SOLR_JAVA_MEM: "-Xms256m -Xmx512m"
      SOLR_LOG_LEVEL: "WARN"
      SOLR_OPTS: "-Dsolr.liveNodes.maxSize=100 -Dhost=solr3"
    volumes:
      - solr3_data:/var/solr
      - ./solr/configsets:/configsets:ro
    ports:
      - "8985:8983"

  # ── Search API ─────────────────────────────────────────────

  search_api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: search_api
    hostname: search_api
    networks:
      - solr_net
    environment:
      SOLR_URL: "http://solr1:8983/solr"
      SOLR_COLLECTION: "games"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      solr1:
        condition: service_healthy
    restart: unless-stopped
